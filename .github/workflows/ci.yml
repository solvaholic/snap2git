name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: bash -n snap2git

      - name: ShellCheck
        run: shellcheck snap2git

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run tests
        run: bats tests/
